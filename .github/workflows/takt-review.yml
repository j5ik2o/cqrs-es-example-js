name: TAKT Review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  takt-review:
    name: TAKT Review
    if: >
      github.event_name == 'pull_request' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        startsWith(github.event.comment.body, '@takt') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      )
    uses: j5ik2o/ci/.github/workflows/takt-review.yml@560170b61c74a9a643a483a052ccbad0d6ad409a
    permissions:
      contents: read
      pull-requests: write
      issues: write
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    with:
      workflow: review-takt-default
      provider: claude-sdk
      model: claude-sonnet-4-5-20250929
      non_blocking: "true"
      ci_ref: 560170b61c74a9a643a483a052ccbad0d6ad409a
